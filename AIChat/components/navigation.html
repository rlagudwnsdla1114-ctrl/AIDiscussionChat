  <body>
    <link rel="stylesheet" href="../style.css" />
    <div>
      <link href="./navigation.css" rel="stylesheet" />
      <div class="navigation-container1">
        <nav class="navigation-root">
          <div class="navigation-container">
            <a href="../index.html">
              <div aria-label="DebateMind Home" class="navigation-logo-link">
                <span class="navigation-brand section-title">DebateMind</span>
              </div>
            </a>
            <div class="navigation-desktop-menu">
              <a href="../index.html">
                <div class="navigation-link"><span>소개</span></div>
              </a>
              <a href="../anime-chat.html">
                <div class="navigation-link"><span>애니 채팅</span></div>
              </a>
              <a href="../drama-chat.html">
                <div class="navigation-link"><span>드라마 채팅</span></div>
              </a>
            </div>
            <button
              id="mobileNavToggle"
              aria-label="Open Menu"
              aria-expanded="false"
              class="navigation-mobile-toggle"
            >
              <svg
                fill="none"
                width="24"
                xmlns="http://www.w3.org/2000/svg"
                height="24"
                stroke="currentColor"
                viewBox="0 0 24 24"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M4 6h16M4 12h16M4 18h16"></path>
              </svg>
            </button>
          </div>
        </nav>
        <div
          id="mobileNavOverlay"
          aria-hidden="true"
          class="navigation-mobile-overlay"
        >
          <div class="navigation-overlay-header">
            <a href="../index.html">
              <div aria-label="DebateMind Home" class="navigation-logo-link">
                <span class="navigation-brand section-title">DebateMind</span>
              </div>
            </a>
            <button
              id="mobileNavClose"
              aria-label="Close Menu"
              class="navigation-mobile-close"
            >
              <svg
                fill="none"
                width="24"
                xmlns="http://www.w3.org/2000/svg"
                height="24"
                stroke="currentColor"
                viewBox="0 0 24 24"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M18 6L6 18M6 6l12 12"></path>
              </svg>
            </button>
          </div>
          <div class="navigation-overlay-content">
            <a href="../index.html">
              <div class="navigation-overlay-link"><span>소개</span></div>
            </a>
            <a href="../anime-chat.html">
              <div class="navigation-overlay-link"><span>애니 채팅</span></div>
            </a>
            <a href="../drama-chat.html">
              <div class="navigation-overlay-link">
                <span>드라마 채팅</span>
              </div>
            </a>
          </div>
        </div>
        <div class="navigation-container2">
          <div class="navigation-container3">
            <script defer="" data-name="navigation-logic">
              document.addEventListener('DOMContentLoaded', function() {
                (function(){
                const mobileNavToggle = document.getElementById('mobileNavToggle');
                const mobileNavClose = document.getElementById('mobileNavClose');
                const mobileNavOverlay = document.getElementById('mobileNavOverlay');

                function openMobileNav() {
                  mobileNavOverlay.setAttribute('aria-hidden', 'false');
                  mobileNavToggle.setAttribute('aria-expanded', 'true');
                  document.body.style.overflow = 'hidden';
                }

                function closeMobileNav() {
                  mobileNavOverlay.setAttribute('aria-hidden', 'true');
                  mobileNavToggle.setAttribute('aria-expanded', 'false');
                  document.body.style.overflow = '';
                }

                mobileNavToggle.addEventListener('click', openMobileNav);
                mobileNavClose.addEventListener('click', closeMobileNav);

                // Close overlay on link click
                const overlayLinks = mobileNavOverlay.querySelectorAll('.navigation-overlay-link');
                overlayLinks.forEach(link => {
                  link.addEventListener('click', closeMobileNav);
                });

                // Close overlay on ESC key
                document.addEventListener('keydown', (e) => {
                  if (e.key === 'Escape' && mobileNavOverlay.getAttribute('aria-hidden') === 'false') {
                    closeMobileNav();
                  }
                });
                })()
              });
            </script>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
